<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#16003a" />
    <meta name="theme-color" content="#16003a" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#16003a" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="dark" />
    <title>Davids Game Library</title>
    <meta
      name="description"
      content="Davids Game Library - entdecke meine Projekte rund um Games und Apps."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;700;800&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-blur bg-blur-a" aria-hidden="true"></div>
    <div class="bg-blur bg-blur-b" aria-hidden="true"></div>
    <div class="bg-blur bg-blur-c" aria-hidden="true"></div>

    <main class="shell">
      <section class="project-grid">
        <a class="project-card" href="https://ronschka.de/michelles-apotheke">
          <div class="media-frame">
            <img
              src="./assets/michelle-apotheke.png"
              alt="Vorschau Michelles Apotheke"
              loading="lazy"
            />
            <span class="shine" aria-hidden="true"></span>
          </div>
          <h2 class="project-title">Michelles Apotheke</h2>
        </a>

        <a class="project-card" href="https://ronschka.de/superLisaRun">
          <div class="media-frame">
            <video
              src="./assets/superLisaRun.mp4"
              autoplay
              muted
              loop
              playsinline
              preload="metadata"
            ></video>
            <span class="shine" aria-hidden="true"></span>
          </div>
          <h2 class="project-title">SuperLisaRun</h2>
        </a>
      </section>
    </main>
  </body>
</html>
